name: CI

# Triggers: runs on every push to master and can also be started manually
# from the Actions tab (workflow_dispatch).
on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-dita:
    name: Build DITA
    runs-on: ubuntu-latest

    steps:
      # ── 1. Check out the repository ────────────────────────────────────────
      - name: Git checkout
        uses: actions/checkout@v4

      # ── 2. Build Markdown output ───────────────────────────────────────────
      #
      # The `org.lwdita` plugin (bundled with DITA-OT 4.4) converts DITA
      # content to Markdown. One .md file is produced per DITA topic by
      # default.
      #
      # CHUNK TO CONTENT
      # To merge all topics into a single Markdown file, add --args.chunk=combine
      # to the dita command (uncomment the line below and remove the plain one):
      #
      #   build: |
      #     dita -i dita/document.ditamap -o out/markdown -f markdown \
      #          --args.chunk=combine
      #
      # DITAVAL FILTERING
      # To include/exclude content using a DITAVal filter file:
      #   1. Edit the sample file at dita/myfilter.ditaval to match the
      #      profiling attributes used in your DITA topics.
      #   2. Add --filter to the dita command below, e.g.:
      #
      #        dita -i dita/document.ditamap \
      #             -o out/markdown \
      #             -f markdown \
      #             --filter=dita/myfilter.ditaval
      #
      #   3. To apply multiple DITAVal files at once, repeat --filter:
      #
      #        dita -i dita/document.ditamap \
      #             -o out/markdown \
      #             -f markdown \
      #             --filter=dita/audience-expert.ditaval \
      #             --filter=dita/platform-linux.ditaval
      #
      - name: Build Markdown
        uses: dita-ot/dita-ot-action@4.4
        with:
          build: |
            dita -i dita/document.ditamap -o out/markdown -f markdown

      # ── 3. Upload the Markdown files as a downloadable workflow artifact ───
      #
      # After the workflow runs, open the Actions tab, select the run, and
      # download the "dita-markdown" artifact from the Artifacts section.
      #
      - name: Upload Markdown artifact
        uses: actions/upload-artifact@v4
        with:
          name: dita-markdown
          path: out/markdown
